<!-- Navigation -->
<header class="navbar" role="banner">
    <div class="container">
<a href="index.html" class="navbar-brand">
    <img src="assets/images/logo.png" alt="Park Queen Logo" class="logo-img">
</a>
        <nav class="nav-links" role="navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>

        </nav>
        <button class="nav-hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>

    <section class="page-hero">
<div class="page-hero-bg" style="background-image: url('assets/images/contact/NDS_5344.jpg')"></div>
        <div class="page-hero-overlay"></div>
        <div class="page-hero-content">
            <nav class="breadcrumb-luxury">
                <a href="index.html">Home</a>
                <i class="fas fa-chevron-right"></i>
                <span>Contact</span>
            </nav>
            <h1 class="page-hero-title">Connect<br><em>With Us</em></h1>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div>
                    <div class="section-eyebrow">GET IN TOUCH</div>
                    <h2 class="section-title">We're Here to Assist You</h2>
                    <div class="contact-info-item">
                        <div class="contact-info-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div>
                            <div class="contact-info-label">LOCATION</div>
                            <div class="contact-info-value">123 Luxury Avenue<br>Metropolis, MP 123456</div>
                        </div>
                    </div>
                    <!-- Repeat contact info items -->
                </div>
                <div class="contact-form-wrap">
                    <form id="contact-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>NAME</label>
                                <input type="text" required>
                            </div>
                            <div class="form-group">
                                <label>EMAIL</label>
                                <input type="email" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>MESSAGE</label>
                            <textarea rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn-gold">SEND MESSAGE</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Map Section -->
    <section class="map-section">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3413.225242928371!2d77.17301531505815!3d31.103869981472707!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390578e3e35d8a4f%3A0x9dd3d3e5d0e83a3a!2sThe%20Ridge%2C%20Shimla%2C%20Himachal%20Pradesh!5e0!3m2!1sen!2sin!4v1624456789012!5m2!1sen!2sin" 
        width="100%" 
        height="450" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy">
      </iframe>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-grid">
          <!-- Full footer content from index.html -->
        </div>
      </div>
    </footer>

    <button id="scroll-top" class="visible"><i class="fas fa-chevron-up"></i></button>
    <script src="assets/js/main.js"></script>
</body>
</html>
